<!-- Parent Attendance — single API call, minimal DOM -->
<div class="par-page">

  <!-- Loading -->
  <div *ngIf="loading" class="par-state">Loading…</div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="par-state par-error">
    {{ error }}
    <button class="par-retry" (click)="load()">Retry</button>
  </div>

  <!-- Content -->
  <ng-container *ngIf="!loading && !error">

    <!-- Today card -->
    <div class="par-today" [class.par-today--absent]="today?.status === 'ABSENT'">
      <div class="par-today-label">Today</div>
      <div *ngIf="today" class="par-today-status" [class.par-today-status--absent]="today.status === 'ABSENT'">
        {{ label(today.status) }}
      </div>
      <div *ngIf="!today" class="par-today-status par-today-status--none">
        Not yet marked
      </div>
    </div>

    <!-- 7-day history -->
    <div class="par-history-header">Last 7 days</div>

    <div *ngIf="!history.length" class="par-state">No previous records.</div>

    <ul class="par-history">
      <li
        *ngFor="let d of history; trackBy: trackByDate"
        class="par-day"
        [class.par-day--absent]="d.status === 'ABSENT'">
        <span class="par-day-date">{{ formatDate(d.attendance_date) }}</span>
        <span class="par-day-status"
              [class.par-day-status--present]="d.status === 'PRESENT' || d.status === 'LATE'"
              [class.par-day-status--absent]="d.status === 'ABSENT'">
          {{ label(d.status) }}
        </span>
      </li>
    </ul>

  </ng-container>

</div>

<style>
  .par-page {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    font-size: 16px;
    background: #f5f5f5;
  }

  .par-state {
    padding: 32px;
    text-align: center;
    color: #555;
  }
  .par-error { color: #c62828; }
  .par-retry {
    display: block;
    margin: 12px auto 0;
    padding: 10px 24px;
    background: #c62828;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }

  /* Today card */
  .par-today {
    margin: 16px;
    padding: 24px;
    border-radius: 12px;
    background: #e8f5e9;
    text-align: center;
  }
  .par-today--absent { background: #fdecea; }

  .par-today-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    margin-bottom: 8px;
  }
  .par-today-status {
    font-size: 32px;
    font-weight: 700;
    color: #2e7d32;
  }
  .par-today-status--absent { color: #c62828; }
  .par-today-status--none   { font-size: 20px; color: #888; }

  /* History */
  .par-history-header {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #777;
  }
  .par-history {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .par-day {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
  }
  .par-day--absent { background: #fff8f8; }

  .par-day-date   { color: #333; font-size: 15px; }
  .par-day-status { font-size: 14px; font-weight: 600; color: #888; }
  .par-day-status--present { color: #2e7d32; }
  .par-day-status--absent  { color: #c62828; }
</style>
